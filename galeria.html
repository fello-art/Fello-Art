<!DOCTYPE html>
<html>
<head>
    <title>Galería</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#1f4037,#99f2c8);
            color:white;
            text-align:center;
        }

        /* MENÚ */
        .menu{
            position:fixed;
            top:0;
            width:100%;
            background:rgba(0,0,0,0.7);
            padding:15px;
        }

        .menu a{
            color:white;
            margin:0 20px;
            text-decoration:none;
            font-weight:bold;
        }

        /* GALERÍA */
        .galeria{
            margin-top:100px;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
        }

        .card{
            background:rgba(255,255,255,0.1);
            padding:15px;
            border-radius:15px;
            width:220px;
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

        /* BOTÓN */
        .btn{
            display:inline-block;
            margin-top:10px;
            background:#ff6b6b;
            color:white;
            padding:8px 15px;
            border-radius:8px;
            text-decoration:none;
        }

        .btn:hover{
            background:#ff4b4b;
        }
    </style>

</head>

<body>

    <!-- MENÚ -->
    <div class="menu">
        <a href="index.html">Inicio</a>
        <a href="galeria.html">Galería</a>
        <a href="contacto.html">Contacto</a>
    </div>

    <h1 style="margin-top:100px;">🎨 Galería de Obras</h1>

    <div class="galeria">

        <div class="card">
            <img src="cuadro1.jpeg">
            <p>Obra 1</p>
            <a href="contacto.html?obra=Obra 1" class="btn">Me interesa</a>
        </div>

        <div class="card">
            <img src="cuadro2.jpeg">
            <p>Obra 2</p>
            <a href="contacto.html?obra=Obra 2" class="btn">Me interesa</a>
        </div>

        <div class="card">
            <img src="cuadro3.jpeg">
            <p>Obra 3</p>
            <a href="contacto.html?obra=Obra 3" class="btn">Me interesa</a>
        </div>

        <div class="card">
            <img src="cuadro4.jpeg">
            <p>Obra 4</p>
            <a href="contacto.html?obra=Obra 4" class="btn">Me interesa</a>
        </div>

    </div>

</body>
</html>
