<!DOCTYPE html>
<html>
<head>
<title>Galería de Arte</title>

<style>
body{
    font-family: Arial;
    background-color: #111;
    color: white;
    text-align: center;
    margin: 0;
}

/* Título */
h1{
    margin-top: 20px;
}

/* Contenedor */
.galeria{
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 30px;
    flex-wrap: wrap;
}

/* Tarjetas */
.card{
    background: #1c1c1c;
    padding: 15px;
    border-radius: 12px;
    width: 260px;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
    transition: 0.3s;
}

.card:hover{
    transform: translateY(-5px);
}

/* Imágenes */
.card img{
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
    cursor: pointer;
}

.card img:hover{
    transform: scale(1.1);
}

/* Modal (imagen grande) */
.modal{
    display: none;
    position: fixed;
    z-index: 1;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
}

.modal img{
    margin: auto;
    display: block;
    max-width: 80%;
    border-radius: 10px;
}

.modal span{
    position: absolute;
    top: 20px;
    right: 35px;
    font-size: 40px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>🎨 Galería de Pinturas</h1>
<p>Artista: Rosaly</p>

<div class="galeria">

    <!-- OBRA 1 -->
    <div class="card">
        <img src="cuadro1.jpeg" onclick="abrirModal(this.src)">
        <h3>Obra 1</h3>
        <p>Acrílico sobre lienzo</p>
        <p>2025</p>
    </div>

    <!-- OBRA 2 -->
    <div class="card">
        <img src="cuadro 2.jpeg" onclick="abrirModal(this.src)">
        <h3>Obra 2</h3>
        <p>Pintura al óleo</p>
        <p>2025</p>
    </div>

</div>

<!-- MODAL -->
<div id="miModal" class="modal">
    <span onclick="cerrarModal()">&times;</span>
    <img id="imgGrande">
</div>

<script>
function abrirModal(src){
    document.getElementById("miModal").style.display = "block";
    document.getElementById("imgGrande").src = src;
}

function cerrarModal(){
    document.getElementById("miModal").style.display = "none";
}
</script>

</body>
</html>
