<!DOCTYPE html>
<html>
<head>
  <title>Galería de Arte</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(135deg, #1f4037, #99f2c8);
      text-align: center;
      scroll-behavior: smooth;
    }

    /* ===== PORTADA ===== */
    .portada {
      height: 100vh;
      background: url('cuadro1.jpeg') no-repeat center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    /* efecto oscuro elegante */
    .portada::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }

    .contenido-portada {
      position: relative;
      z-index: 1;
      animation: fadeIn 2s ease;
    }

    .contenido-portada h1 {
      font-size: 50px;
      margin: 0;
    }

    .contenido-portada h2 {
      margin: 10px 0;
      font-weight: normal;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #ff6b6b;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4c4c;
      transform: scale(1.05);
    }

    /* ===== GALERÍA ===== */
    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      padding: 40px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 15px;
      width: 250px;
      backdrop-filter: blur(10px);
      box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
      transition: 0.4s;
      animation: fadeUp 1s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card img:hover {
      opacity: 0.8;
    }

    /* ===== MODAL (imagen grande) ===== */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .modal img {
      max-width: 80%;
      max-height: 80%;
      border-radius: 10px;
    }

    /* ===== ANIMACIONES ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px);}
      to { opacity: 1; transform: translateY(0);}
    }

  </style>
</head>

<body>

<!-- ===== PORTADA ===== -->
<div class="portada">
  <div class="contenido-portada">
    <h1>🎨 Galería de Pinturas</h1>
    <h2>Artista: Valentín</h2>
    <p>Pinturas al óleo y por encargo</p>

    <a href="#galeria">
      <button class="btn">Ver obras</button>
    </a>
  </div>
</div>

<!-- ===== GALERÍA ===== -->
<h2 id="galeria">Mis Obras</h2>

<div class="galeria">

  <!-- OBRA 1 -->
  <div class="card">
    <img src="cuadro1.jpeg" onclick="abrir(this.src)">
    <h3>Obra 1</h3>
    <p>Óleo sobre lienzo</p>
    <p>2025</p>
  </div>

  <!-- OBRA 2 -->
  <div class="card">
    <img src="cuadro2.jpeg" onclick="abrir(this.src)">
    <h3>Obra 2</h3>
    <p>Óleo sobre lienzo</p>
    <p>2025</p>
  </div>

  <!-- AGREGA MÁS AQUÍ -->
  <div class="card">
    <img src="cuadro3.jpg" onclick="abrir(this.src)">
    <h3>Obra 3</h3>
    <p>Óleo sobre lienzo</p>
    <p>2025</p>
  </div>

  <div class="card">
    <img src="cuadro4.jpg" onclick="abrir(this.src)">
    <h3>Obra 4</h3>
    <p>Óleo sobre lienzo</p>
    <p>2025</p>
  </div>

</div>

<!-- ===== MODAL ===== -->
<div id="modal" class="modal" onclick="cerrar()">
  <img id="imgGrande">
</div>

<!-- ===== SCRIPT ===== -->
<script>
  function abrir(src) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("imgGrande").src = src;
  }

  function cerrar() {
    document.getElementById("modal").style.display = "none";
  }
</script>

</body>
</html>
