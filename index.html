<!DOCTYPE html>
<html>
<head>
<title>Galería</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1f4037,#99f2c8);
  color:white;
  text-align:center;
}

/* MENU */
.menu{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.6);
  padding:15px;
}

.menu a{
  color:white;
  margin:0 20px;
  text-decoration:none;
  font-weight:bold;
}

/* GALERIA ORDENADA */
.galeria{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:25px;
  padding:100px 20px;
}

/* TARJETAS */
.card{
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  padding:15px;
  box-shadow:0px 4px 15px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* IMÁGENES */
.card img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* BOTONES */
.btn{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.like{
  background:#ff6b6b;
  color:white;
}

.interes{
  background:#4CAF50;
  color:white;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:80%;
}
</style>
</head>
